<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ふたりの日記 iPhone対応版</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;background:#fff7fb;color:#263143;font-size:16px;-webkit-text-size-adjust:100%}.app{max-width:640px;margin:0 auto;padding-bottom:92px}.header{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid #f5cfe0;padding:12px 14px}.title{font-weight:900;font-size:22px;color:#be185d}.sub{font-size:12px;color:#667085;margin-top:3px}.badge{display:inline-block;margin-top:8px;padding:7px 10px;border-radius:999px;background:#fce7f3;color:#be185d;font-size:12px;font-weight:800}.wrap{padding:12px}.card{background:#fff;border:1px solid #f6d6e4;border-radius:20px;padding:15px;margin:12px 0;box-shadow:0 8px 22px rgba(130,60,90,.08)}h2{font-size:19px;margin:0 0 6px;color:#be185d}.muted{font-size:13px;color:#667085;line-height:1.6}.grid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}.btn{width:100%;border:0;border-radius:16px;min-height:50px;padding:12px 14px;font-size:16px;font-weight:900;cursor:pointer}.pink{background:#ec4899;color:#fff}.blue{background:#0ea5e9;color:#fff}.gray{background:#f2f4f7;color:#344054;border:1px solid #d0d5dd}.red{background:#fff1f2;color:#be123c;border:1px solid #fecdd3}.small{min-height:44px;font-size:14px;padding:10px}.label{display:block;margin:14px 0 7px;color:#be185d;font-size:14px;font-weight:900}input,textarea,select{width:100%;border:1.5px solid #f3bdd4;border-radius:15px;background:#fff;min-height:48px;padding:13px;font-size:16px;color:#263143;-webkit-appearance:none;appearance:none}input[type="date"]{-webkit-appearance:auto;appearance:auto}textarea{min-height:150px;line-height:1.7;resize:vertical}.notice{background:#fff1f7;border:1px solid #f9c7dc;color:#9d174d;border-radius:16px;padding:11px;margin-top:10px;font-size:13px;line-height:1.6}.goalList{border:1px solid #f9c7dc;border-radius:16px;overflow:hidden}.goal{display:flex;gap:11px;align-items:flex-start;padding:12px;border-bottom:1px solid #fde2ee;font-size:14px;line-height:1.5}.goal:last-child{border-bottom:0}.goal input{width:22px;height:22px;min-height:22px;margin:0;accent-color:#ec4899;-webkit-appearance:checkbox;appearance:checkbox}.fixedSave{position:fixed;left:12px;right:12px;bottom:12px;z-index:30;max-width:616px;margin:auto}.fixedSave .btn{box-shadow:0 10px 24px rgba(236,72,153,.28)}.hide{display:none}.toolbar{display:grid;grid-template-columns:1fr;gap:10px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.summary{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.pill{display:inline-block;background:#fdf2f8;color:#be185d;border:1px solid #fbcfe8;border-radius:999px;padding:7px 9px;font-size:12px;font-weight:900}.pill.blue{background:#eff6ff;color:#0369a1;border-color:#bfdbfe}.pill.green{background:#f0fdf4;color:#15803d;border-color:#bbf7d0}.entry{padding:0;overflow:hidden}.entryMain{padding:15px}.date{display:inline-block;background:#fdf2f8;border:1px solid #fbcfe8;color:#be185d;border-radius:999px;padding:8px 10px;font-size:13px;font-weight:900}.entryText{white-space:pre-wrap;line-height:1.85;font-size:16px;background:#fffafd;border:1px solid #f7d7e5;border-radius:16px;padding:13px;margin-top:12px}.goalBox{background:#fffaf0;border:1px solid #fed7aa;border-radius:16px;padding:12px;margin-top:12px}.goalTitle{font-weight:900;color:#c2410c;margin-bottom:6px}.goalItem{display:flex;gap:8px;padding:7px 0;border-top:1px dashed #fed7aa;font-size:14px;line-height:1.5}.goalItem:first-of-type{border-top:0}.ok{color:#16a34a;font-weight:900}.ng{color:#fb7185;font-weight:900}.ratingBox{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:16px;padding:12px;margin-top:12px}.stars{font-size:20px;color:#f59e0b;letter-spacing:1px}.comments{background:#f8fbff;border-top:1px solid #dbeafe;padding:14px}.comment{background:#fff;border:1px solid #bfdbfe;border-radius:15px;padding:11px;margin-top:9px}.comment b{color:#0369a1}.commentBody{white-space:pre-wrap;line-height:1.65;margin-top:3px}.time{font-size:11px;color:#667085;margin-top:5px}.form{display:grid;grid-template-columns:1fr;gap:8px;margin-top:11px}.empty{text-align:center;color:#98a2b3;border:1.5px dashed #f8c7df;border-radius:18px;padding:28px 10px;background:#fff}@media(min-width:560px){.toolbar{grid-template-columns:1fr auto}.actions{width:260px}.form.rating{grid-template-columns:160px 1fr auto}.form.comment{grid-template-columns:1fr auto}.fixedSave{left:50%;right:auto;transform:translateX(-50%);width:616px}}
</style>
</head>
<body>
<div class="app">
<header class="header"><div class="title">ふたりの日記</div><div class="sub">iPhoneのSafariでも開きやすい単体HTML版</div><div class="badge" id="roleBadge">未選択</div></header>
<main class="wrap">
<section class="card" id="roleCard"><h2>使う人を選んでください</h2><div class="muted">役割に合わせて使える機能が表示されます。</div><div class="grid"><button class="btn pink" onclick="setRole('writer')">髙橋里桜<br><span style="font-size:12px;font-weight:700">日記・目標チェックを書く側</span></button><button class="btn blue" onclick="setRole('commenter')">関谷蓮<br><span style="font-size:12px;font-weight:700">コメント・評価をする側</span></button></div></section>
<section class="card hide" id="writerCard"><h2>今日の日記を書く</h2><div class="muted">日付・日記・目標チェックを保存できます。</div><label class="label">📅 日付</label><input type="date" id="diaryDate"><label class="label">✍️ 日記</label><textarea id="diaryText" placeholder="今日あったこと、思ったことを書いてね"></textarea><div class="notice">目標はできたか確認するためのメモです。できなかった日があっても大丈夫です。</div><label class="label">✅ 今日の目標チェック</label><div class="goalList" id="goalList"></div><div class="fixedSave"><button class="btn pink" onclick="saveEntry()">保存して日記一覧に追加する</button></div></section>
<section class="hide" id="entriesCard"><div class="card"><div class="toolbar"><div><h2>日記一覧</h2><div class="muted">新しい日記から順番に表示されます。</div></div><div class="actions"><button class="btn gray small" onclick="switchRole()">役割切替</button><button class="btn red small" onclick="resetData()">初期化</button></div></div><div class="summary" id="summary"></div></div><div id="entries"></div></section>
</main></div>
<script>
var goals=['バイト終わりにすぐに歯磨きをする','水とお茶以外のまない','お菓子は２個までにする','お腹がすかなくても少しでも何か食べる','1日800Kcal以上','ヨーグルトを食べる','パンは1日1個','お昼は必ず食べる'];
var role='';var entries=[];
try{role=localStorage.getItem('diaryRoleIphone')||'';entries=JSON.parse(localStorage.getItem('diaryEntriesIphone')||'[]')}catch(e){role='';entries=[]}
function el(id){return document.getElementById(id)}
function today(){var d=new Date();var m=('0'+(d.getMonth()+1)).slice(-2);var day=('0'+d.getDate()).slice(-2);return d.getFullYear()+'-'+m+'-'+day}
function fmtDate(v){if(!v)return'';var a=v.split('-');return a[0]+'年'+Number(a[1])+'月'+Number(a[2])+'日'}
function fmtTime(t){var d=new Date(t);return (d.getMonth()+1)+'/'+d.getDate()+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)}
function esc(s){return String(s).replace(/[&<>\"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function saveStore(){try{localStorage.setItem('diaryEntriesIphone',JSON.stringify(entries))}catch(e){alert('保存容量がいっぱいの可能性があります')}}
function setRole(r){role=r;try{localStorage.setItem('diaryRoleIphone',r)}catch(e){}render();window.scrollTo(0,0)}
function switchRole(){role='';try{localStorage.removeItem('diaryRoleIphone')}catch(e){}render();window.scrollTo(0,0)}
function renderGoals(){var html='';for(var i=0;i<goals.length;i++){html+='<label class="goal"><input type="checkbox" id="goal-'+i+'"><span>'+goals[i]+'</span></label>'}el('goalList').innerHTML=html}
function saveEntry(){var text=el('diaryText').value.replace(/^\s+|\s+$/g,'');if(!text){alert('日記を入力してください');return}var date=el('diaryDate').value||today();var gs=[];for(var i=0;i<goals.length;i++){gs.push({text:goals[i],done:el('goal-'+i).checked})}entries.unshift({id:String(new Date().getTime()),date:date,text:text,author:'髙橋里桜',goals:gs,comments:[],rating:null,createdAt:new Date().getTime()});saveStore();el('diaryText').value='';el('diaryDate').value=today();for(var j=0;j<goals.length;j++){el('goal-'+j).checked=false}renderEntries();el('entriesCard').scrollIntoView()}
function addComment(id){var inp=el('comment-'+id);var text=inp.value.replace(/^\s+|\s+$/g,'');if(!text)return;for(var i=0;i<entries.length;i++){if(entries[i].id===id){entries[i].comments.push({author:'関谷蓮',text:text,createdAt:new Date().getTime()});break}}inp.value='';saveStore();renderEntries()}
function saveRating(id){for(var i=0;i<entries.length;i++){if(entries[i].id===id){entries[i].rating={author:'関谷蓮',score:Number(el('ratingScore-'+id).value),text:el('ratingText-'+id).value.replace(/^\s+|\s+$/g,''),createdAt:new Date().getTime()};break}}saveStore();renderEntries()}
function deleteEntry(id){if(!confirm('この日記を削除しますか？'))return;entries=entries.filter(function(e){return e.id!==id});saveStore();renderEntries()}
function resetData(){if(!confirm('すべての日記を削除しますか？'))return;entries=[];saveStore();renderEntries()}
function stars(n){var s='';for(var i=1;i<=5;i++)s+=i<=n?'★':'☆';return s}
function renderSummary(){var total=entries.length,comments=0,rated=0;for(var i=0;i<entries.length;i++){comments+=(entries[i].comments||[]).length;if(entries[i].rating)rated++}el('summary').innerHTML='<span class="pill">📖 日記 '+total+'件</span><span class="pill blue">💬 コメント '+comments+'件</span><span class="pill green">⭐ 評価 '+rated+'件</span>'}
function renderEntries(){renderSummary();var box=el('entries');if(entries.length===0){box.innerHTML='<div class="empty">まだ日記がありません<br><span style="font-size:13px">里桜さん側で保存すると表示されます</span></div>';return}var html='';for(var i=0;i<entries.length;i++){var e=entries[i];var done=0;for(var g=0;g<(e.goals||[]).length;g++){if(e.goals[g].done)done++}var goalHtml='<div class="goalBox"><div class="goalTitle">目標チェック <span class="pill">'+done+'/'+(e.goals||[]).length+'</span></div>';for(var k=0;k<(e.goals||[]).length;k++){var gg=e.goals[k];goalHtml+='<div class="goalItem"><span class="'+(gg.done?'ok':'ng')+'">'+(gg.done?'✓':'－')+'</span><span>'+esc(gg.text)+'</span></div>'}goalHtml+='</div>';var commentHtml='';for(var c=0;c<(e.comments||[]).length;c++){var cm=e.comments[c];commentHtml+='<div class="comment"><b>'+esc(cm.author)+'</b><div class="commentBody">'+esc(cm.text)+'</div><div class="time">'+fmtTime(cm.createdAt)+'</div></div>'}if(!commentHtml)commentHtml='<div class="muted" style="margin-top:8px">まだコメントはありません</div>';var rating='';if(e.rating){rating='<div class="ratingBox"><b style="color:#15803d">蓮さんの評価</b><div class="stars">'+stars(e.rating.score)+'</div>'+(e.rating.text?'<div class="commentBody">'+esc(e.rating.text)+'</div>':'')+'<div class="time">'+fmtTime(e.rating.createdAt)+'</div></div>'}var tools='';if(role==='commenter'){tools='<div class="form comment"><input id="comment-'+e.id+'" placeholder="この日記にコメントを書く"><button class="btn blue small" onclick="addComment(\''+e.id+'\')">送信</button></div><div class="form rating"><select id="ratingScore-'+e.id+'"><option value="5">★★★★★ とてもよくできた</option><option value="4">★★★★☆ よくできた</option><option value="3">★★★☆☆ ふつう</option><option value="2">★★☆☆☆ 少し心配</option><option value="1">★☆☆☆☆ 無理しないで</option></select><input id="ratingText-'+e.id+'" placeholder="評価メモ・ひとこと"><button class="btn blue small" onclick="saveRating(\''+e.id+'\')">評価</button></div>'}var del=role==='writer'?'<button class="btn red small" onclick="deleteEntry(\''+e.id+'\')">削除</button>':'';html+='<article class="card entry"><div class="entryMain"><div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start"><div><div class="date">📅 '+fmtDate(e.date)+'</div><div class="muted" style="margin-top:6px">記入：'+esc(e.author)+'</div></div><div style="width:86px">'+del+'</div></div><div class="entryText">'+esc(e.text)+'</div><div class="summary"><span class="pill">✅ '+done+'/'+(e.goals||[]).length+'</span><span class="pill blue">💬 '+(e.comments||[]).length+'件</span>'+(e.rating?'<span class="pill green">⭐ '+e.rating.score+'/5</span>':'')+'</div>'+goalHtml+rating+'</div><div class="comments"><b>💬 コメント</b> <span class="pill blue">'+(e.comments||[]).length+'件</span>'+commentHtml+tools+'</div></article>'}box.innerHTML=html}
function render(){el('roleBadge').innerHTML=role==='writer'?'髙橋里桜：記入側':role==='commenter'?'関谷蓮：コメント側':'未選択';el('roleCard').className=role?'card hide':'card';el('writerCard').className=role==='writer'?'card':'card hide';el('entriesCard').className=role?'':'hide';if(role==='writer'&&!el('diaryDate').value)el('diaryDate').value=today();renderEntries()}
renderGoals();render();
</script>
</body>
</html>
