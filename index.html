<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>futari diary</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:linear-gradient(#fff4f7,#fffaf4,#f5fbff);color:#3b3033}.hide{display:none!important}.lock{min-height:100vh;display:grid;place-items:center;padding:24px}.card,.entry{background:#fffffff0;border:1px solid #ffe0e8;border-radius:24px;box-shadow:0 14px 34px #d4567622;padding:16px;margin:12px 0}.lock .card{max-width:390px;width:100%;text-align:center;padding:28px 22px}.icon{width:80px;height:80px;border-radius:26px;background:#ffe1ea;display:grid;place-items:center;margin:0 auto 12px;font-size:38px}h1,h2,h3{margin:0}.sub,.note{color:#8b737a;font-size:13px;line-height:1.6}.pin{width:100%;font-size:28px;text-align:center;letter-spacing:12px;border:2px solid #ffd1dc;border-radius:18px;padding:14px;margin-top:12px}.btn{border:0;border-radius:16px;background:linear-gradient(135deg,#f48aa3,#e85d84);color:white;font-weight:900;padding:13px 16px;box-shadow:0 9px 18px #e85d8433}.btn.full{width:100%;margin-top:12px}.app{max-width:760px;margin:0 auto;padding:12px 10px 80px}.top{position:sticky;top:0;z-index:2;background:#fff7f8dd;backdrop-filter:blur(12px);margin:-12px -10px 12px;padding:12px 10px}.hero{background:linear-gradient(135deg,#fff,#fff0f4);border:1px solid #ffe0e8;border-radius:26px;padding:15px;box-shadow:0 14px 34px #d4567620}.row{display:flex;gap:10px;align-items:center}.mini{width:52px;height:52px;border-radius:17px;background:#ffe1ea;display:grid;place-items:center;font-size:26px}.roles{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.role{border:1px solid #ffd3dd;background:white;border-radius:15px;padding:10px;font-weight:900;color:#986070}.role.on{background:linear-gradient(135deg,#f48aa3,#e85d84);color:white;border:0}.title{font-size:18px;font-weight:900;margin:6px 0 12px}label{display:block;font-size:13px;color:#8b737a;font-weight:900;margin:11px 0 6px}input,textarea{width:100%;border:1.5px solid #f0d4dc;border-radius:15px;padding:12px;background:white;font:inherit}textarea{min-height:115px;line-height:1.7}.goals{display:grid;gap:8px}.goal{display:flex;gap:9px;align-items:center;background:#fff9fb;border:1px solid #ffe1e9;border-radius:15px;padding:11px}.goal input{width:22px;height:22px;accent-color:#f48aa3}.goal span{font-size:14px;font-weight:700}.entryHead{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.date{background:#fff0f4;color:#d94f73;border-radius:99px;padding:6px 10px;font-size:13px;font-weight:900;white-space:nowrap}.author{color:#8b737a;font-size:12px;font-weight:900}.text{white-space:pre-wrap;line-height:1.75;font-size:15.5px;margin:12px 0}.tags{display:flex;gap:6px;flex-wrap:wrap}.tag{font-size:12px;border-radius:99px;padding:5px 9px;background:#f3f3f3;font-weight:800}.done{background:#e9fff2;color:#278857}.miss{background:#fff0f0;color:#b65b67}.rating{background:#fffdf4;border:1px solid #f7e9b8;border-radius:17px;padding:12px;margin-top:12px}.stars{font-size:25px;display:flex;gap:4px;margin:6px 0}.star{border:0;background:transparent;padding:0;filter:grayscale(1);opacity:.45}.star.on{filter:none;opacity:1}.commentArea{border-top:1px dashed #efd1da;margin-top:12px;padding-top:12px}.comment{background:#eef6ff;border:1px solid #d8ebff;border-radius:17px;padding:10px 12px;margin:8px 0}.who{font-size:12px;color:#4774ad;font-weight:900}.comment p{margin:3px 0 0;white-space:pre-wrap}.formrow{display:flex;gap:8px;margin-top:9px}.formrow input{flex:1}.danger{background:white;border:1px solid #ffd1db;color:#d94f73;border-radius:14px;padding:10px;font-weight:900;margin-top:10px}.count{background:#e85d84;color:white;border-radius:99px;padding:5px 10px;font-size:12px;font-weight:900}.between{display:flex;justify-content:space-between;align-items:center;margin:18px 4px 8px}@media(max-width:520px){.entryHead,.formrow{flex-direction:column}.formrow .btn{width:100%}}
</style>
</head>
<body>
<div id="lock" class="lock"><div class="card"><div class="icon">💞</div><h1>futari diary</h1><p class="sub">2人だけの共有日記</p><input id="pin" class="pin" inputmode="numeric" maxlength="4" placeholder="----"><button class="btn full" onclick="unlock()">開く</button><p id="pinmsg" class="note"></p></div></div>
<div id="app" class="app hide"><div class="top"><div class="hero"><div class="row"><div class="mini">📖</div><div><h2>futari diary</h2><div id="status" class="note">Firebaseに接続中...</div></div></div><div class="roles"><button id="rio" class="role" onclick="setRole('writer')">髙橋里桜<br><span class="note">記入する側</span></button><button id="ren" class="role" onclick="setRole('commenter')">関谷蓮<br><span class="note">コメント・評価</span></button></div></div></div>
<div id="writer" class="card"><div class="title">🌷 今日の日記を書く</div><label>日付</label><input id="date" type="date"><label>日記</label><textarea id="diary" placeholder="今日あったこと、思ったことを書いてね。"></textarea><label>目標チェック</label><div id="goals" class="goals"></div><button class="btn full" onclick="saveEntry()">保存する</button><p class="note">保存すると、別端末にも反映されます。</p></div>
<div id="commenter" class="card hide"><div class="title">💬 蓮さんの画面</div><p class="note">里桜さんが書いた日記にコメントと評価をつけられます。</p></div>
<div class="between"><h3>日記一覧</h3><span id="count" class="count">0件</span></div><div id="entries"></div></div>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
import{getFirestore,collection,addDoc,updateDoc,deleteDoc,doc,onSnapshot,query,orderBy,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';
const firebaseConfig={apiKey:'AIzaSyAVOmllXgrj0k6l83d-OS9KhKzPGaX_Lzg',authDomain:'futari-diary-8379c.firebaseapp.com',projectId:'futari-diary-8379c',storageBucket:'futari-diary-8379c.firebasestorage.app',messagingSenderId:'787620642487',appId:'1:787620642487:web:0ca2d5faf6ee34f0ba5732'};
const db=getFirestore(initializeApp(firebaseConfig));
const PIN='0310';
const goalTexts=['バイト終わりにすぐに歯磨きをする','水とお茶以外のまない','お菓子は２個までにする','お腹がすかなくても少しでも何か食べる','1日800Kcal以上','ヨーグルトを食べる','パンは1日1個','お昼は必ず食べる'];
let role=localStorage.futariRole||'writer',entries=[];
window.unlock=()=>{if(pin.value.trim()===PIN){localStorage.pinOK='yes';lock.classList.add('hide');app.classList.remove('hide');init()}else pinmsg.textContent='暗証番号が違います'};
window.setRole=r=>{role=r;localStorage.futariRole=r;rio.classList.toggle('on',r==='writer');ren.classList.toggle('on',r==='commenter');writer.classList.toggle('hide',r!=='writer');commenter.classList.toggle('hide',r!=='commenter');render()};
function setup(){goals.innerHTML=goalTexts.map((g,i)=>`<label class="goal"><input type="checkbox" id="g${i}"><span>${esc(g)}</span></label>`).join('')}
window.saveEntry=async()=>{let d=date.value,t=diary.value.trim();if(!d)return alert('日付を入れてください');if(!t)return alert('日記を書いてください');let gs=goalTexts.map((g,i)=>({text:g,done:document.getElementById('g'+i).checked}));await addDoc(collection(db,'entries'),{date:d,text:t,author:'髙橋里桜',goals:gs,comments:[],rating:0,ratingText:'',createdAt:Date.now(),updatedAt:serverTimestamp()});diary.value='';goalTexts.forEach((_,i)=>document.getElementById('g'+i).checked=false)};
window.addComment=async id=>{let el=document.getElementById('c'+id),text=el.value.trim();if(!text)return;let e=entries.find(x=>x.id===id);let comments=[...(e.comments||[]),{author:'関谷蓮',text,createdAt:Date.now()}];await updateDoc(doc(db,'entries',id),{comments,updatedAt:serverTimestamp()});el.value=''};
window.setRating=async(id,rating)=>updateDoc(doc(db,'entries',id),{rating,updatedAt:serverTimestamp()});
window.saveRatingText=async id=>updateDoc(doc(db,'entries',id),{ratingText:document.getElementById('rt'+id).value.trim(),updatedAt:serverTimestamp()});
window.del=async id=>{if(confirm('この日記を削除しますか？'))await deleteDoc(doc(db,'entries',id))};
function listen(){onSnapshot(query(collection(db,'entries'),orderBy('createdAt','desc')),s=>{entries=s.docs.map(d=>({id:d.id,...d.data()}));status.textContent='☁️ 共有中：別端末にも反映されます';render()},e=>{status.textContent='⚠️ 接続エラー：Firebaseルールを確認してください';console.error(e)})}
function render(){count.textContent=entries.length+'件';if(!entries.length){document.getElementById('entries').innerHTML='<div class="card" style="text-align:center;color:#8b737a">まだ日記がありません。</div>';return}document.getElementById('entries').innerHTML=entries.map(e=>{let done=(e.goals||[]).filter(g=>g.done).length,total=(e.goals||[]).length||goalTexts.length;let stars=[1,2,3,4,5].map(n=>`<button class="star ${(+e.rating||0)>=n?'on':''}" ${role==='commenter'?`onclick="setRating('${e.id}',${n})"`:''}>⭐</button>`).join('');return`<div class="entry"><div class="entryHead"><div><div class="author">記入：${esc(e.author||'髙橋里桜')}</div><div class="text">${esc(e.text||'')}</div></div><div class="date">📅 ${fmt(e.date)}</div></div><div class="tags"><span class="tag done">達成 ${done}/${total}</span>${(e.goals||[]).map(g=>`<span class="tag ${g.done?'done':'miss'}">${g.done?'✓':'・'} ${esc(g.text)}</span>`).join('')}</div><div class="rating"><b>蓮さんの評価</b><div class="stars">${stars}</div>${e.ratingText?`<div class="note">📝 ${esc(e.ratingText)}</div>`:'<div class="note">まだ評価コメントはありません</div>'}${role==='commenter'?`<div class="formrow"><input id="rt${e.id}" placeholder="評価コメントを書く" value="${attr(e.ratingText||'')}"><button class="btn" onclick="saveRatingText('${e.id}')">保存</button></div>`:''}</div><div class="commentArea"><b>コメント</b>${(e.comments||[]).length?(e.comments||[]).map(c=>`<div class="comment"><div class="who">${esc(c.author||'関谷蓮')}</div><p>${esc(c.text||'')}</p></div>`).join(''):'<div class="note">まだコメントはありません</div>'}${role==='commenter'?`<div class="formrow"><input id="c${e.id}" placeholder="コメントを書く"><button class="btn" onclick="addComment('${e.id}')">送信</button></div>`:''}</div>${role==='writer'?`<button class="danger" onclick="del('${e.id}')">この日記を削除</button>`:''}</div>`}).join('')}
function fmt(d){if(!d)return'';let p=d.split('-');return p.length===3?`${+p[0]}/${+p[1]}/${+p[2]}`:d}function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function attr(s){return esc(s).replace(/"/g,'&quot;')}
function init(){setup();setRole(role);date.valueAsDate=new Date();listen()}pin.addEventListener('keydown',e=>{if(e.key==='Enter')unlock()});if(localStorage.pinOK==='yes'){lock.classList.add('hide');app.classList.remove('hide');init()}
</script>
</body>
</html>
